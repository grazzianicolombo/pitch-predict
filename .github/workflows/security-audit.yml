name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Roda toda segunda às 07:00 UTC para detectar vulnerabilidades em dependências novas
    - cron: '0 7 * * 1'

jobs:
  audit-backend:
    name: npm audit — backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --prefer-offline
      - name: Run security audit
        run: npm audit --audit-level=high
        # Falha o build se houver vulnerabilidade high ou critical

  audit-frontend:
    name: npm audit — frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline
      - name: Run security audit
        run: npm audit --audit-level=high

  license-check-backend:
    name: License compliance — backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --prefer-offline
      - name: Check dependency licenses
        run: |
          npx license-checker --onlyAllow \
            'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;BlueOak-1.0.0;Unlicense;Python-2.0;CC-BY-3.0;CC-BY-4.0' \
            --excludePrivatePackages \
            --summary

  license-check-frontend:
    name: License compliance — frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --prefer-offline
      - name: Check dependency licenses
        run: |
          npx license-checker --onlyAllow \
            'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;BlueOak-1.0.0;Unlicense' \
            --excludePrivatePackages \
            --summary
